<!DOCTYPE html>
<html>
<head>
    <title>CFG Simulator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: hwb(215 56% 19%);
            text-align: center;
            padding: 40px;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 400px;
            margin: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            padding: 10px;
            width: 80%;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        pre {
            text-align: left;
            background: #f4f4f4;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .error {
            color: red;
            font-weight: bold;
        }

        .success {
            color: green;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>CFG Simulator (S → aSb | ε)</h2>

    <input type="text" id="input" placeholder="Enter string">
    <br>
    <button onclick="simulate()">Simulate</button>

    <pre id="output"></pre>
</div>

<script>
function isValid(str) {
    let n = str.length;

    // must be even length
    if (n % 2 !== 0) return false;

    let half = n / 2;

    // first half must be all 'a'
    for (let i = 0; i < half; i++) {
        if (str[i] !== 'a') return false;
    }

    // second half must be all 'b'
    for (let i = half; i < n; i++) {
        if (str[i] !== 'b') return false;
    }

    return true;
}

function simulate() {
    let str = document.getElementById("input").value.trim();
    let output = "";

    if (str === "") {
        document.getElementById("output").innerHTML = "<span class='error'>Please enter a string</span>";
        return;
    }

    if (!isValid(str)) {
        document.getElementById("output").innerHTML =
            "<span class='error'>❌ Invalid String! Not generated by CFG.</span>";
        return;
    }

    let n = str.length / 2;

    output += "✅ Valid String\n\nDerivation:\n";
    output += "S\n";

    for (let i = 0; i < n; i++) {
        output += "→ " + "a".repeat(i+1) + "S" + "b".repeat(i+1) + "\n";
    }

    output += "→ " + str;

    document.getElementById("output").innerHTML =
        "<span class='success'>" + output + "</span>";
}
</script>

</body>
</html>
